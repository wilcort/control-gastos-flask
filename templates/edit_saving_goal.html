{% extends "base.html" %}

{% block title %}{{ t("edit_goal") }}{% endblock %}

{% block content %}

<h2>{{ t("edit_saving_goal") }}</h2>

<div class="card shadow">
    <div class="card-body">

        <form method="POST" action="/savings/edit/{{ goal.id }}">

            <div class="mb-3">
                <label class="form-label">{{ t("goal_name") }}</label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    value="{{ goal.name }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    {{ t("target_amount") }}
                     ({{ user.currency | currency_symbol }})
                </label>
                <input
                    type="number"
                    name="target_amount"
                    step="0.01"
                    min="0.01"
                    class="form-control"
                    value="{{ goal.target_amount }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">{{ t("deadline") }}</label>
                <input
                    type="date"
                    name="deadline"
                    class="form-control"
                    value="{{ goal.deadline.strftime('%Y-%m-%d') if goal.deadline else '' }}">
            </div>

            <button type="submit" class="btn btn-primary">
                {{ t("save_changes") }}
            </button>

            <a href="/savings" class="btn btn-secondary">
                 {{ t("cancel") }}
            </a>

        </form>

    </div>
</div>

{% endblock %}
