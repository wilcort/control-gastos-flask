{% extends "base.html" %}

{% block title %}Editar Meta{% endblock %}

{% block content %}

<h2>Editar Meta de Ahorro</h2>

<div class="card shadow">
    <div class="card-body">

        <form method="POST" action="/savings/edit/{{ goal.id }}">

            <div class="mb-3">
                <label class="form-label">Nombre de la meta</label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    value="{{ goal.name }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Monto objetivo ({{ user.currency | currency_symbol }})
                </label>
                <input
                    type="number"
                    name="target_amount"
                    step="0.01"
                    min="0.01"
                    class="form-control"
                    value="{{ goal.target_amount }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha límite</label>
                <input
                    type="date"
                    name="deadline"
                    class="form-control"
                    value="{{ goal.deadline.strftime('%Y-%m-%d') if goal.deadline else '' }}">
            </div>

            <button type="submit" class="btn btn-primary">
                Guardar Cambios
            </button>

            <a href="/savings" class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>
</div>

{% endblock %}
