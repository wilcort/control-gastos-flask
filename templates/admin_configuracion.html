{% extends "base.html" %}

{% block title %}Configuración del Sistema{% endblock %}

{% block content %}

<h2>{{ t("system_settings") }}</h2>
<p>{{ t("system_settings_description") }}</p>

<div class="card shadow">
    <div class="card-body">

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label"> {{ t("system_name") }}</label>
                <input
                    type="text"
                    name="system_name"
                    class="form-control"
                    value="{{ config.system_name }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">{{ t("support_email") }}</label>
                <input
                    type="email"
                    name="support_email"
                    class="form-control"
                    value="{{ config.support_email }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">  {{ t("company_logo") }}</label>
            
                <input type="file" name="logo" class="form-control" accept="image/png,image/jpeg,image/webp">
            
                {% if config.logo %}
                <div class="mt-3">
                    <p class="text-muted mb-1"> {{ t("current_logo") }}</p>
                    <img src="{{ config.logo }}" alt="Logo actual" style="max-height: 100px; max-width: 220px;">
                </div>
                {% endif %}
            </div>
        
            <button type="submit" class="btn btn-primary">
                 {{ t("save_settings") }}
            </button>

            <a href="/admin" class="btn btn-secondary">
                {{ t("back") }}
            </a>

        </form>

    </div>
</div>

{% endblock %}
