{% extends "base.html" %}

{% block title %}Configuración del Sistema{% endblock %}

{% block content %}

<h2>Configuración del Sistema</h2>
<p>Modifica los datos generales de la aplicación.</p>

<div class="card shadow">
    <div class="card-body">

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Nombre del sistema</label>
                <input
                    type="text"
                    name="system_name"
                    class="form-control"
                    value="{{ config.system_name }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo de soporte</label>
                <input
                    type="email"
                    name="support_email"
                    class="form-control"
                    value="{{ config.support_email }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Logo de la Empresa</label>
            
                <input type="file" name="logo" class="form-control" accept="image/png,image/jpeg,image/webp">
            
                {% if config.logo %}
                <div class="mt-3">
                    <p class="text-muted mb-1">Logo actual:</p>
                    <img src="{{ config.logo }}" alt="Logo actual" style="max-height: 100px; max-width: 220px;">
                </div>
                {% endif %}
            </div>
        
            <button type="submit" class="btn btn-primary">
                Guardar configuración
            </button>

            <a href="/admin" class="btn btn-secondary">
                Volver
            </a>

        </form>

    </div>
</div>

{% endblock %}
