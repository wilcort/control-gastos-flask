{% extends "base.html" %}

{% block title %}Cambiar Contraseña{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-header">
                <h3>Cambiar Contraseña</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">
                            Contraseña Actual
                        </label>

                        <input
                            type="password"
                            name="current_password"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Nueva Contraseña
                        </label>

                        <input
                            type="password"
                            name="new_password"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Confirmar Contraseña
                        </label>

                        <input
                            type="password"
                            name="confirm_password"
                            class="form-control"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">
                        Guardar Contraseña
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
