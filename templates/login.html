{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header">
                <h3>Iniciar Sesión</h3>
            </div>

            <div class="card-body">

                <form method="POST" action="/login" >

                    <div class="mb-3">
                        <label class="form-label">
                            Correo Electrónico
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="correo@ejemplo.com"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Contraseña
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Ingresar

                    </button>

                    <div class="mt-3 text-center">
                        <a href="/forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
