{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header">
                <h2>{{ t("login_title") }}</h2>
            </div>

            <div class="card-body">

                <form method="POST" action="/login" >

                    <div class="mb-3">
                        <label>{{ t("email") }}</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="correo@ejemplo.com"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>{{ t("password") }}</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        {{ t("sign_in") }}

                    </button>

                    <div class="mt-3 text-center">
                        <a href="/forgot-password">{{ t("forgot_password") }}</a>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
