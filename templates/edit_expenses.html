{% extends "base.html" %}

{% block title %}{{ t("edit_expense") }}{% endblock %}

{% block content %}

<h2>Editar Gasto</h2>

<div class="card shadow">
    <div class="card-body">

        <form method="POST" action="/expenses/edit/{{ expense.id }}">

            <div class="mb-3">
                <label class="form-label"> {{ t("date") }}</label>
                <input
                    type="date"
                    name="date"
                    class="form-control"
                    value="{{ expense.date }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">{{ t("category") }}</label>
                <select name="category" class="form-control" required>
                    <option value="Alimentación" {% if expense.category == "Alimentación" %}selected{% endif %}>  {{ t("food") }}</option>
                    <option value="Transporte" {% if expense.category == "Transporte" %}selected{% endif %}>{{ t("transport") }}</option>
                    <option value="Vivienda" {% if expense.category == "Vivienda" %}selected{% endif %}>{{ t("housing") }}</option>
                    <option value="Salud" {% if expense.category == "Salud" %}selected{% endif %}>{{ t("health") }}</option>
                    <option value="Educación" {% if expense.category == "Educación" %}selected{% endif %}>{{ t("education") }}</option>
                    <option value="Entretenimiento" {% if expense.category == "Entretenimiento" %}selected{% endif %}> {{ t("entertainment") }}</option>
                    <option value="Servicios" {% if expense.category == "Servicios" %}selected{% endif %}> {{ t("services") }}</option>
                    <option value="Otros" {% if expense.category == "Otros" %}selected{% endif %}> {{ t("others") }}</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label"> {{ t("description") }}</label>
                <input
                    type="text"
                    name="description"
                    class="form-control"
                    value="{{ expense.description }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                     {{ t("amount") }} ({{ user.currency | currency_symbol }})
                </label>
                <input
                    type="number"
                    name="amount"
                    step="0.01"
                    class="form-control"
                    value="{{ expense.amount }}"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">
                {{ t("save_changes") }}
            </button>

            <a href="/expenses" class="btn btn-secondary">
                {{ t("cancel") }}
            </a>

        </form>

    </div>
</div>

{% endblock %}
