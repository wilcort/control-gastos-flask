{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<h2>Dashboard</h2>
<p>Resumen general de tus finanzas personales.</p>

<div class="row mt-4">

    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h5>Total Ingresos</h5>
                <h3>{{total_incomes }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h5>Total Gastos</h5>
                <h3>{{total_expenses }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h5>Balance</h5>
                <h3>{{balance }}</h3>
            </div>
        </div>
    </div>

</div>

{% endblock %}
